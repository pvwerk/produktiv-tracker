name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build-Nummer einbetten
        shell: bash
        run: |
          BID="${{ github.run_number }}-${GITHUB_SHA:0:7}"
          echo "BUILD_ID = \"$BID\"" > _buildinfo.py
          echo "{\"build\": \"$BID\", \"name\": \"Produktivitaets-Tracker.exe\"}" > version.json
          echo "Build-ID: $BID"

      - name: Build EXE
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Produktivitaets-Tracker
          path: dist/Produktivitaets-Tracker.exe

      - name: Publish release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Produktivitäts-Tracker (neueste Version)
          body: |
            Fertige Windows-Anwendung. Datei **Produktivitaets-Tracker.exe** herunterladen und doppelklicken.
            Die App aktualisiert sich künftig selbst. Alle Daten bleiben lokal auf dem PC.
          files: |
            dist/Produktivitaets-Tracker.exe
            version.json
